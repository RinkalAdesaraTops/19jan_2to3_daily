        let add = () => {
            let a = 10

            document.write('<br>Addition is ' + (a + b))
        }
        let a = 10
        let b = 20
        // fat arrow function

        var mult = (x, y)=> document.write('<br>Multiplication is ' + (x * y))
        const pi = 3.14
        let r = 2.5
        const area = ()=> pi * r ** 2
        
        let cube = a => a ** 3
        
        add()
        minus()
