<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=45
        let b=20
        //1-addition 2 subtraction 3 multiply 4 division
        let ch = 4
        switch(ch){
            case 1: c=a+b
                    document.write('<br>Addition is '+(a+b))
                    break
            case 2: c=a-b
                    document.write('<br>Minus is '+c)
                    break
            case 3: c=a*b
                    document.write('<br>Multiply is '+c)
                    break
            case 4: c=a/b
                    document.write('<br>Division is '+c)
                    break
            default: document.write('<br>Invalid choice..')
                     break
        }
    </script>
</body>
</html>
