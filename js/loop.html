<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // while,do_while & for loop
        // 1 to 5
        let i=10 
        while(i<=5){ //1<=5 6<=5 10<=5
            //code
            document.write('<br>'+i) //1 2 3 4 5
            i++ //i+=1 i=i+1 //2  3 4 5 6
        }
        document.write('<hr>')
        let j=10
        while(j>=1){ //entry controlled loop
            document.write('<br>'+j)
            j--
        }

    </script>
</body>
</html>
