<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=45
        let b=20
        //+-addition -=subtraction *=multiply /=division
        let ch = "*"
        switch(ch) {
            case '+': c=a+b
                    document.write('<br>Addition is '+(a+b))
                    break
            case '-': c=a-b
                    document.write('<br>Minus is '+c)
                    break
            case '*': c=a*b
                    document.write('<br>Multiply is '+c)
                    break
            case '/': c=a/b
                    document.write('<br>Division is '+c)
                    break
            default: document.write('<br>Invalid choice..')
                     break
        }
    </script>
</body>
</html>
